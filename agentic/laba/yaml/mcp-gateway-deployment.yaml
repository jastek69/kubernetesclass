```yaml id="6d4g07"
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mcp-gateway
  namespace: mcp-gateway

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mcp-gateway

  template:
    metadata:
      labels:
        app: mcp-gateway

    spec:

      serviceAccountName: mcp-gateway-sa

      containers:

      - name: nginx

        image: nginx:1.27-alpine

        ports:
        - containerPort: 443

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"

        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false

        volumeMounts:

        - name: nginx-config
          mountPath: /etc/nginx/conf.d

        - name: tls-secret
          mountPath: /etc/nginx/tls
          readOnly: true

        - name: client-ca
          mountPath: /etc/nginx/client-ca
          readOnly: true

      volumes:

      - name: nginx-config
        configMap:
          name: mcp-nginx-config

      - name: tls-secret
        secret:
          secretName: mcp-server-tls

      - name: client-ca
        secret:
          secretName: mcp-client-ca
```
