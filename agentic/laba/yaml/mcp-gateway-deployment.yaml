spec:
  serviceAccountName: mcp-gateway-sa

  containers:
  - name: nginx

    image: nginx:1.27-alpine
    imagePullPolicy: IfNotPresent

    ports:
    - containerPort: 443

    securityContext:
      allowPrivilegeEscalation: false

    readinessProbe:
      tcpSocket:
        port: 443

    livenessProbe:
      tcpSocket:
        port: 443

    volumeMounts:

    - name: nginx-config
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: default.conf

    - name: tls-secret
      mountPath: /etc/nginx/tls
      readOnly: true

    - name: client-ca
      mountPath: /etc/nginx/client-ca
      readOnly: true
