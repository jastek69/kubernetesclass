# you need to save this in constraints/namespace-communication.yaml

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sNamespaceCommunication

metadata:
  name: restrict-mcp-access

spec:
  match:
    kinds:
    - apiGroups: ["networking.k8s.io"]
      kinds: ["NetworkPolicy"]

  parameters:
    blockedNamespaces:
    - app01
    - ingress
