apiVersion: v1
kind: LimitRange
metadata:
  name: app01-limits
  namespace: app01

spec:
  limits:
  - type: Container

    default:
      cpu: "500m"
      memory: "512Mi"

    defaultRequest:
      cpu: "250m"
      memory: "256Mi"

    min:
      cpu: "100m"
      memory: "128Mi"

    max:
      cpu: "2"
      memory: "2Gi"
