apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
      - name: broken-app
        image: python:3.11-slim
        command: ["python", "-c"]
        args:
        - |
          import time
          while True:
              print("ERROR: failed to connect to database at db.internal.local:5432")
              print("DETAIL: connection timeout after 5 seconds")
              time.sleep(10)
