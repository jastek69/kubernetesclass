apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vertex-agent-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vertex-agent-rolebinding
subjects:
- kind: ServiceAccount
  name: vertex-agent-ksa
roleRef:
  kind: Role
  name: vertex-agent-role
  apiGroup: rbac.authorization.k8s.io
